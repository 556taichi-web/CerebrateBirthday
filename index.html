<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Happy Birthday 莉奈</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Noto+Serif+JP:wght@200;300&family=Noto+Sans+JP:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:#06060a}
body{color:#ede8df;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#wrap{background:#06060a;min-height:100vh;position:relative;overflow:hidden}
#cvs{position:fixed;inset:0;pointer-events:none;z-index:0}

/* HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:3rem 2rem;position:relative;z-index:2;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(200,169,106,.08) 0%,transparent 70%)
}
.ey{font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:.7rem;letter-spacing:.6em;color:#c8a96a;opacity:0;animation:up 1s ease forwards .4s}
.hh{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(2rem,5vw,3rem);color:#e2c98a;opacity:0;animation:up 1.2s ease forwards 1s;margin-top:2.2rem;line-height:1}
.hb{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(5rem,18vw,10rem);line-height:.85;letter-spacing:-.02em;color:#f0ebe2;opacity:0;animation:up 1.4s ease forwards 1.6s;text-shadow:0 2px 40px rgba(200,169,106,.2)}
.hn{font-family:'Noto Serif JP',serif;font-weight:200;font-size:clamp(2rem,6vw,3.6rem);color:#c8a96a;opacity:0;animation:up 1s ease forwards 2.4s;margin-top:1rem;letter-spacing:.1em}
.scroll-h{position:absolute;bottom:2.2rem;font-family:'Noto Sans JP',sans-serif;font-size:.65rem;letter-spacing:.35em;color:#555;opacity:0;animation:up 1s ease forwards 3.8s,pulse 3s ease-in-out infinite 5s}

/* DIVIDER */
.dv{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:1rem;padding:0 2rem}
.dv::before,.dv::after{content:'';flex:1;height:.5px;background:linear-gradient(to right,transparent,rgba(200,169,106,.2),transparent)}
.dv span{font-size:.5rem;color:rgba(200,169,106,.3);letter-spacing:.3em}

/* PHOTOS */
.photos{position:relative;z-index:2;padding:4.5rem 0 3rem}
.plabel{font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:.68rem;letter-spacing:.55em;color:#c8a96a;text-align:center;margin-bottom:2.5rem;opacity:0;transform:translateY(16px);transition:opacity .8s,transform .8s}
.strip{display:flex;gap:.8rem;padding:0 2rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.si{flex:0 0 72vw;max-width:300px;scroll-snap-align:center;border-radius:3px;overflow:hidden;opacity:0;transform:translateY(20px);transition:opacity .9s,transform .9s;position:relative;aspect-ratio:4/5;background:#111}
.si img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.92) saturate(.88)}
.si::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,10,.45) 0%,transparent 55%)}
.si.in{opacity:1;transform:translateY(0)}
.sdots{display:flex;justify-content:center;gap:6px;margin-top:1.4rem}
.dot{width:4px;height:4px;border-radius:50%;background:#2a2820;transition:background .3s,transform .3s}
.dot.a{background:#c8a96a;transform:scale(1.5)}

/* MESSAGE */
.msg{min-height:85vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2.5rem;text-align:center;position:relative;z-index:2;background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(200,169,106,.05) 0%,transparent 70%)}
.mrule{width:40px;height:.5px;background:#c8a96a;opacity:0;transform:scaleX(0);transform-origin:left;transition:opacity .9s,transform .9s;margin-bottom:2.5rem}
.mdate{font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:.78rem;letter-spacing:.45em;color:#c8a96a;opacity:0;transform:translateY(16px);transition:opacity .8s .1s,transform .8s .1s}
.mmain{font-family:'Noto Serif JP',serif;font-weight:200;font-size:clamp(1.5rem,5vw,2.6rem);line-height:2;color:#f0ebe2;margin:1.8rem 0;opacity:0;transform:translateY(16px);transition:opacity .8s .25s,transform .8s .25s}
.mmain b{color:#e2c98a;font-weight:300}
.msub{font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:.8rem;letter-spacing:.2em;color:#7a756e;opacity:0;transform:translateY(16px);transition:opacity .8s .4s,transform .8s .4s}

/* TEASER */
.teaser{min-height:55vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2.5rem 2rem;text-align:center;position:relative;z-index:2}
.tpre{font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:.7rem;letter-spacing:.45em;color:#555;opacity:0;transform:translateY(16px);transition:opacity .8s,transform .8s}
.tword{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(4rem,15vw,7rem);color:#c8a96a;line-height:1;opacity:0;transform:translateY(20px);transition:opacity .9s .15s,transform .9s .15s;text-shadow:0 0 60px rgba(200,169,106,.25)}
.tbody{font-family:'Noto Serif JP',serif;font-weight:200;font-size:clamp(1.1rem,4vw,1.6rem);line-height:2.1;color:#ede8df;margin:1.4rem 0 1.6rem;opacity:0;transform:translateY(16px);transition:opacity .8s .3s,transform .8s .3s}
.thint{font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:.72rem;letter-spacing:.3em;color:#555;opacity:0;transform:translateY(16px);transition:opacity .8s .5s,transform .8s .5s}

/* CLOSING */
.closing{height:18vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.ctext{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(1.2rem,4vw,2rem);color:#3a3530;opacity:0;transform:translateY(16px);transition:opacity .9s,transform .9s}

.rev{opacity:1!important;transform:translateY(0) scaleX(1)!important}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.65}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cvs"></canvas>

<section class="hero">
  <div class="ey">2 0 2 6 . 0 5 . 2 2</div>
  <div class="hh">Happy</div>
  <div class="hb">Birthday</div>
  <div class="hn">莉奈</div>
  <div class="scroll-h">スクロールしてね &darr;</div>
</section>

<div class="dv"><span>✦</span></div>

    const ang=Math.random()*Math.PI*2;
    const spd=Math.random()*16+5;
    cf.push({x:ox,y:oy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-(upBias||10),
      col:CC[Math.floor(Math.random()*CC.length)],
      w:Math.random()*9+3,h:Math.random()*4+2,
      a:Math.random()*Math.PI*2,da:(Math.random()-.5)*.22,
      g:.44,life:1,dec:Math.random()*.011+.007,
      sh:Math.random()>.45?'r':'c'});
  }
}
setTimeout(()=>{
  burst(W*.5,H*.42,100,14);
  setTimeout(()=>{burst(W*.1,H*.5,55,10);burst(W*.9,H*.5,55,10);},350);
  setTimeout(()=>{burst(W*.5,H*.42,70,16);},700);
},2300);

function drawCF(){
  cf.forEach((c,i)=>{
    c.vy+=c.g;c.x+=c.vx;c.y+=c.vy;c.a+=c.da;c.life-=c.dec;
    if(c.life<=0){cf.splice(i,1);return;}
    ctx.save();ctx.globalAlpha=Math.min(c.life,1)*.95;ctx.fillStyle=c.col;
    ctx.translate(c.x,c.y);ctx.rotate(c.a);
    if(c.sh==='c'){ctx.beginPath();ctx.arc(0,0,c.w/2,0,Math.PI*2);ctx.fill();}
    else ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    ctx.restore();
  });
}

(function loop(){
  ctx.clearRect(0,0,W,H);
  ps.forEach((p,i)=>{
    p.y+=p.vy;p.x+=p.vx;p.a+=p.da;
    if(p.y>H+10)ps[i]=mkP(false);
    ctx.save();ctx.globalAlpha=p.op;
    if(p.p){ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle='#c8a96a';ctx.beginPath();ctx.ellipse(0,0,p.s*2,p.s*.8,0,0,Math.PI*2);ctx.fill();}
    else{ctx.fillStyle='#f0ebe2';ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  drawCF();
  requestAnimationFrame(loop);
})();
const rv=document.querySelectorAll('.plabel,.mrule,.mdate,.mmain,.msub,.tpre,.tword,.tbody,.thint,.ctext');
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('rev')}),{threshold:.15});
rv.forEach(el=>io.observe(el));
const items=document.querySelectorAll('.si');
const io2=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{threshold:.1});
items.forEach(el=>io2.observe(el));
const strip=document.getElementById('strip'),dots=document.querySelectorAll('.dot');
strip.addEventListener('scroll',()=>{
  const i=Math.round(strip.scrollLeft/(strip.firstElementChild.offsetWidth+13));
  dots.forEach((d,j)=>d.classList.toggle('a',j===i));
},{passive:true});
</script>
