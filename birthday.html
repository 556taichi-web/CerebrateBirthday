<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #c9a96e;
  --gold-light: #e8c98a;
  --cream: #f5f0e8;
  --bg: #080808;
  --bg2: #101010;
  --muted: #555;
  --border: #1e1e1e;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--cream);
  overflow-x: hidden;
  font-size: 16px;
}

#canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── HERO ─────────────────────────────── */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  z-index: 1;
}

.hero-eyebrow {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  font-size: 0.75rem;
  letter-spacing: 0.45em;
  color: var(--gold);
  opacity: 0;
  animation: fadeUp 1s ease forwards 0.6s;
}

.hero-happy {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  color: var(--gold);
  opacity: 0;
  animation: fadeUp 1s ease forwards 1.2s;
  margin-top: 2rem;
}

.hero-birthday {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: clamp(4rem, 15vw, 8.5rem);
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: var(--cream);
  opacity: 0;
  animation: fadeUp 1.2s ease forwards 1.8s;
}

.hero-name {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: clamp(1.6rem, 5vw, 3rem);
  color: var(--gold-light);
  opacity: 0;
  animation: fadeUp 1s ease forwards 2.6s;
  margin-top: 1.2rem;
}

.scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  color: #3a3a3a;
  opacity: 0;
  animation: fadeUp 1s ease forwards 4s, breathe 2.5s ease-in-out infinite 5s;
}

/* ── DIVIDER ─────────────────────────── */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border), transparent);
  position: relative;
  z-index: 1;
}

/* ── PHOTOS ──────────────────────────── */
.photos-section {
  min-height: 100vh;
  padding: 6rem 2rem;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
}

.section-eyebrow {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  font-size: 0.7rem;
  letter-spacing: 0.5em;
  color: var(--gold);
  text-align: center;
}

.photos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.6rem;
  max-width: 540px;
  width: 100%;
}

@media (max-width: 400px) {
  .photos-grid { grid-template-columns: repeat(2, 1fr); }
  .photo-frame:first-child { grid-column: span 2; }
}

.photo-frame {
  position: relative;
  aspect-ratio: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  overflow: hidden;
  transform: rotate(var(--r)) translateY(24px);
  opacity: 0;
  transition: opacity 0.9s ease, transform 0.9s ease;
}

.photo-frame:nth-child(1) { --r: -1.8deg; transition-delay: 0.05s; }
.photo-frame:nth-child(2) { --r:  1.2deg; transition-delay: 0.15s; }
.photo-frame:nth-child(3) { --r: -0.6deg; transition-delay: 0.25s; }
.photo-frame:nth-child(4) { --r:  1.6deg; transition-delay: 0.35s; }
.photo-frame:nth-child(5) { --r: -1.0deg; transition-delay: 0.45s; }

.photo-frame.in {
  opacity: 1;
  transform: rotate(var(--r)) translateY(0);
}

.photo-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.photo-ph {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: #2a2a2a;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
}

.photo-ph svg {
  width: 28px; height: 28px;
  stroke: #2a2a2a;
  fill: none;
  stroke-width: 1;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── MESSAGE ─────────────────────────── */
.message-section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem;
  text-align: center;
  position: relative;
  z-index: 1;
  gap: 0;
}

.gold-rule {
  width: 48px;
  height: 1px;
  background: var(--gold);
  transform: scaleX(0);
  opacity: 0;
  transition: opacity 0.8s, transform 0.8s;
  margin-bottom: 2.5rem;
}

.msg-date {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  font-size: 0.8rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s 0.15s, transform 0.8s 0.15s;
}

.msg-main {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: clamp(1.6rem, 6vw, 2.8rem);
  line-height: 1.9;
  color: var(--cream);
  margin: 1.6rem 0;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s 0.3s, transform 0.8s 0.3s;
}

.msg-main strong {
  color: var(--gold-light);
  font-weight: 400;
}

.msg-sub {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.78rem;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: var(--muted);
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s 0.45s, transform 0.8s 0.45s;
}

/* ── TEASER ──────────────────────────── */
.teaser-section {
  min-height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem;
  text-align: center;
  position: relative;
  z-index: 1;
}

.teaser-pre {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.45em;
  color: #444;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s, transform 0.8s;
}

.teaser-word {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(3rem, 12vw, 6rem);
  color: var(--gold);
  margin: 1rem 0 0.5rem;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s 0.2s, transform 0.8s 0.2s;
}

.teaser-body {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: clamp(1.05rem, 3.5vw, 1.5rem);
  line-height: 2.1;
  color: var(--cream);
  margin: 1.2rem 0 2rem;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s 0.4s, transform 0.8s 0.4s;
}

.teaser-hint {
  font-family: 'Noto Serif JP', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: #3a3a3a;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s 0.6s, transform 0.8s 0.6s;
}

/* ── CLOSING ─────────────────────────── */
.closing {
  height: 35vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}

.closing-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1rem, 3vw, 1.6rem);
  color: #222;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.8s, transform 0.8s;
}

/* ── REVEALED STATE ──────────────────── */
.rev {
  opacity: 1 !important;
  transform: translateY(0) rotate(var(--r, 0deg)) scaleX(1) !important;
}

/* ── KEYFRAMES ───────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes breathe {
  0%, 100% { opacity: 0.25; }
  50%       { opacity: 0.7; }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<!-- ════ HERO ════ -->
<section class="hero">
  <div class="hero-eyebrow">2 0 2 6 . 0 5 . 2 2</div>
  <div class="hero-happy">Happy</div>
  <div class="hero-birthday">Birthday</div>
  <!-- ★ 名前を入れてください ↓ -->
  <div class="hero-name">名前</div>
  <div class="scroll-hint">スクロールしてね ↓</div>
</section>

<div class="divider"></div>

<!-- ════ PHOTOS ════ -->
<section class="photos-section">
  <div class="section-eyebrow rev">ふたりの思い出</div>
  <div class="photos-grid">
    <!--
      ★ 写真の入れ方:
      HTMLファイルと同じフォルダに写真を置いて
      src="photo1.jpg" のように書き換えてください。
      写真がない場合はグレーのプレースホルダーが表示されます。
    -->
    <div class="photo-frame">
      <img src="photo1.jpg" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="photo-ph" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        photo 1
      </div>
    </div>
    <div class="photo-frame">
      <img src="photo2.jpg" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="photo-ph" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        photo 2
      </div>
    </div>
    <div class="photo-frame">
      <img src="photo3.jpg" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="photo-ph" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        photo 3
      </div>
    </div>
    <div class="photo-frame">
      <img src="photo4.jpg" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="photo-ph" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        photo 4
      </div>
    </div>
    <div class="photo-frame">
      <img src="photo5.jpg" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="photo-ph" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        photo 5
      </div>
    </div>
  </div>
</section>

<div class="divider"></div>

<!-- ════ MESSAGE ════ -->
<section class="message-section">
  <div class="gold-rule" style="display:none"></div>
  <div class="msg-date">5 月 2 2 日</div>
  <div class="msg-main">
    17:50 に白金台駅で集合！<br>
    素敵なディナーに<br>
    ご案内します
  </div>
  <div class="msg-sub">楽しみにしててね</div>
</section>

<div class="divider"></div>

<!-- ════ TEASER ════ -->
<section class="teaser-section">
  <div class="teaser-pre">そして、翌日からは…</div>
  <div class="teaser-word">秘密</div>
  <div class="teaser-body">
    京都で心を癒されに行きましょう！<br>
    素敵な誕生日を！
  </div>
  <div class="teaser-hint">詳細は当日のお楽しみ</div>
</section>

<!-- ════ CLOSING ════ -->
<div class="closing">
  <div class="closing-text">誕生日おめでとう 🎂</div>
</div>

<script>
/* ── PARTICLES ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const GOLD = '#c9a96e', CREAM = '#f5f0e8';
const particles = Array.from({ length: 55 }, () => makeParticle(true));

function makeParticle(init) {
  return {
    x: Math.random() * (W || window.innerWidth),
    y: init ? Math.random() * (H || window.innerHeight) : -8,
    size: Math.random() * 1.8 + 0.4,
    vy: Math.random() * 0.35 + 0.08,
    vx: (Math.random() - 0.5) * 0.25,
    op: Math.random() * 0.3 + 0.05,
    angle: Math.random() * Math.PI * 2,
    da: (Math.random() - 0.5) * 0.018,
    petal: Math.random() > 0.65,
  };
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.op;
  if (p.petal) {
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = GOLD;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size * 2.2, p.size * 0.9, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = CREAM;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

(function loop() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.y += p.vy; p.x += p.vx; p.angle += p.da;
    if (p.y > H + 12) particles[i] = makeParticle(false);
    drawParticle(p);
  });
  requestAnimationFrame(loop);
})();

/* ── SCROLL REVEAL ── */
const revEls = document.querySelectorAll(
  '.gold-rule, .msg-date, .msg-main, .msg-sub,' +
  '.teaser-pre, .teaser-word, .teaser-body, .teaser-hint,' +
  '.closing-text, .section-eyebrow'
);

const photoFrames = document.querySelectorAll('.photo-frame');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('rev');
  });
}, { threshold: 0.18 });

revEls.forEach(el => io.observe(el));

const ioPhotos = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('in');
  });
}, { threshold: 0.1 });

photoFrames.forEach(el => ioPhotos.observe(el));
</script>
</body>
</html>
